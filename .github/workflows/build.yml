name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Electron deps
        working-directory: electron
        run: npm ci

      - name: Check signing credentials
        id: check-signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE=available" >> $GITHUB_ENV
            echo "Code signing: ENABLED"
          else
            echo "APPLE_CERTIFICATE=" >> $GITHUB_ENV
            echo "Code signing: DISABLED (unsigned build)"
          fi

      - name: Build macOS (signed)
        if: env.APPLE_CERTIFICATE != ''
        working-directory: electron
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --arm64 --publish never

      - name: Build macOS (unsigned)
        if: env.APPLE_CERTIFICATE == ''
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --arm64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Electron deps
        working-directory: electron
        run: npm ci

      - name: Build Windows x64
        working-directory: electron
        run: npx electron-builder --win nsis zip --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: win-build
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm libfuse2

      - name: Install Electron deps
        working-directory: electron
        run: npm ci

      - name: Build Linux x64
        working-directory: electron
        run: npx electron-builder --linux AppImage deb --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
          if-no-files-found: error

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List all files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} - FTJM Studio
          body: |
            ## FTJM Studio ${{ github.ref_name }}

            ### Downloads

            #### macOS (Apple Silicon)
            | Type | Bestand |
            |------|---------|
            | DMG Installer | `FTJM.Studio-${{ github.ref_name }}-arm64.dmg` |
            | ZIP Archive | `FTJM.Studio-${{ github.ref_name }}-arm64.zip` |

            #### Windows
            | Type | Bestand |
            |------|---------|
            | NSIS Installer (x64) | `FTJM.Studio.Setup.${{ github.ref_name }}.exe` |
            | ZIP Archive (x64) | `FTJM.Studio-${{ github.ref_name }}-x64.zip` |

            #### Linux
            | Type | Bestand |
            |------|---------|
            | AppImage (x64) | `FTJM.Studio-${{ github.ref_name }}-x86_64.AppImage` |
            | DEB Package (x64) | `ftjm-studio_${{ github.ref_name }}_amd64.deb` |

            ### Vereisten
            - Python 3.10+ geinstalleerd
            - GPU: 4GB+ VRAM (RTX 3060 of beter)
            - RAM: 8GB min, 16GB aanbevolen

            ### Eerste gebruik
            1. Download en installeer de app voor jouw platform
            2. Open Terminal/Command Prompt
            3. Installeer Python dependencies: `pip install -r requirements.txt`
            4. Start de app
            5. ACE-Step wordt automatisch gedownload bij eerste muziek generatie
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.blockmap
          draft: false
          prerelease: false
