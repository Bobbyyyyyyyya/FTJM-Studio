name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Electron deps
        working-directory: electron
        run: npm ci

      - name: Build macOS DMG
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dmg --arm64 --publish never

      - name: Find DMG
        id: find-dmg
        run: |
          DMG=$(find dist -name "*.dmg" | head -1)
          echo "dmg=$DMG" >> $GITHUB_OUTPUT
          echo "Found DMG: $DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: ${{ steps.find-dmg.outputs.dmg }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Electron deps
        working-directory: electron
        run: npm ci

      - name: Build Windows NSIS
        working-directory: electron
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Find EXE
        id: find-exe
        shell: bash
        run: |
          EXE=$(find dist -name "*.exe" | head -1)
          echo "exe=$EXE" >> $GITHUB_OUTPUT
          echo "Found EXE: $EXE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: ${{ steps.find-exe.outputs.exe }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Electron deps
        working-directory: electron
        run: npm ci

      - name: Build Linux AppImage
        working-directory: electron
        run: npx electron-builder --linux AppImage --x64 --publish never

      - name: Find AppImage
        id: find-appimage
        run: |
          APPIMAGE=$(find dist -name "*.AppImage" | head -1)
          echo "appimage=$APPIMAGE" >> $GITHUB_OUTPUT
          echo "Found AppImage: $APPIMAGE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: ${{ steps.find-appimage.outputs.appimage }}

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List files
        run: find . -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} - FTJM Studio
          body: |
            ## FTJM Studio ${{ github.ref_name }}

            ### Downloads
            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `FTJM Studio-${{ github.ref_name }}-arm64.dmg` |
            | Windows (x64) | `FTJM Studio Setup ${{ github.ref_name }}.exe` |
            | Linux (x64) | `FTJM Studio-${{ github.ref_name }}-x86_64.AppImage` |

            ### Vereisten
            - Python 3.10+ geinstalleerd
            - GPU: 4GB+ VRAM (RTX 3060 of beter)
            - RAM: 8GB min, 16GB aanbevolen

            ### Eerste gebruik
            1. Download en installeer de app voor jouw platform
            2. Open Terminal/Command Prompt
            3. Installeer Python dependencies: `pip install -r requirements.txt`
            4. Start de app
            5. ACE-Step wordt automatisch gedownload bij eerste muziek generatie
          files: |
            mac-installer/*.dmg
            win-installer/*.exe
            linux-installer/*.AppImage
          draft: false
          prerelease: false
